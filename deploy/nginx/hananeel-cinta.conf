server {
    listen 80;
    listen [::]:80;
    server_name hananeelcinta.id www.hananeelcinta.id;

    root /var/www/hananeel-cinta/current/public;
    index index.php;
    charset utf-8;
    client_max_body_size 6M;

    access_log /var/log/nginx/hananeel-cinta.access.log;
    error_log /var/log/nginx/hananeel-cinta.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri /index.php?$query_string;
        access_log off;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
